[mgr]
sort_by = "btime"
sort_reverse = true
linemode = "btime"
sort_dir_first = false
show_symlink = true

[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Edit in Neovim" },
]
open = [
    { run = 'open "$@"', block = true, desc = "Open with default application" }
]
reveal = [
    { run = 'open -R "$@"', block = true, desc = "Reveal in Finder" }
]
run_bash = [
    { run = 'bash "$@"', block = true, desc = "Run in Bash Shell" }
]
run_fish = [
    { run = 'fish "$@"', block = true, desc = "Run in Fish Shell" }
]
default = [
    { run = 'open "$@"', block = true, desc = "Open with default application" },
    { run = 'ouch compress "$@" "$1.zip"', block = true, desc = "Compress File/s"},
    { run = 'open -R "$@"', block = true, desc = "Reveal in Finder" }
]

[open]
rules = [
    { mime = "*", use = "default" },

    { mime = "text/*", use = ["edit", "default"]},

    { url = "*.json", use = ["edit", "default"]},
    { url = "*.yaml", use = ["edit", "default"]},
    { url = "*.yml", use = ["edit", "default"]},
    { url = "*.toml", use = ["edit", "default"]},

    { url = "*.fish", use = ["run_fish", "edit", "default"]},
]

[plugin]
prepend_preloaders = [ ]
prepend_previewers = [
    { url = "*.key", run = "noop" },
    { url = "*.pages", run = "noop" },
    { url = "*.numbers", run = "noop" },
]
